name: Deploy React Examples to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "core/package.json"
      - "adapters/react/package.json"
      - "examples/react-patterns/index.html"
      - "examples/react-patterns/public/**"
      - "examples/react-patterns/src/**"
      - "examples/react-patterns/package.json"
      - "examples/react-patterns/tsconfig.json"
      - "examples/react-patterns/vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: examples-pages
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    name: Build React Router Examples
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Type-check examples app
        run: pnpm --filter '@headless-toast/examples-react-patterns' typecheck

      - name: Build examples app
        run: pnpm --filter '@headless-toast/examples-react-patterns' build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: examples/react-patterns/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
