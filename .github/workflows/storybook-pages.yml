name: Publish Storybook

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/storybook-pages.yml"
      - "core/package.json"
      - "adapters/react/package.json"
      - "examples/react-storybook/.storybook/**"
      - "examples/react-storybook/src/**"
      - "examples/react-storybook/package.json"
      - "examples/react-storybook/tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    name: Build Storybook
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Build Storybook
        run: pnpm storybook:build
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: examples/react-storybook/storybook-static

  deploy:
    name: Deploy Storybook
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
