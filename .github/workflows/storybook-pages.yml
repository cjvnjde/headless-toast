name: Publish Storybook

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check changed paths
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.storybook == 'true' }}
    steps:
      - name: Checkout
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Resolve base commit
        if: github.event_name != 'workflow_dispatch'
        id: base
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"

      - name: Detect storybook-related changes
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.base.outputs.sha }}
          filters: |
            storybook:
              - ".github/workflows/storybook-pages.yml"
              - "core/package.json"
              - "adapters/react/package.json"
              - "examples/react/.storybook/**"
              - "examples/react/src/**"
              - "examples/react/package.json"
              - "examples/react/tsconfig.json"

  build:
    name: Build Storybook
    needs: check-paths
    if: needs.check-paths.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Build Storybook
        run: pnpm storybook:build
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react/storybook-static

  deploy:
    name: Deploy Storybook
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
