name: Publish Storybook

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/storybook-pages.yml"
      - "core/package.json"
      - "adapters/react/package.json"
      - "examples/react-storybook/.storybook/**"
      - "examples/react-storybook/src/**"
      - "examples/react-storybook/package.json"
      - "examples/react-storybook/tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    name: Build Storybook
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Build Storybook
        run: pnpm storybook:build
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react-storybook/storybook-static

  deploy:
    name: Deploy Storybook
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
