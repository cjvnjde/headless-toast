<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Headless Toast React examples built with TanStack Router and Tailwind CSS v4."
    />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="%BASE_URL%favicon-96x96.png"
    />
    <link rel="shortcut icon" href="%BASE_URL%favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%apple-touch-icon.png"
    />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <title>Headless Toast Examples</title>
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem("theme");
          var mode =
            stored === "light" || stored === "dark" || stored === "auto"
              ? stored
              : "auto";
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var resolved =
            mode === "auto" ? (prefersDark ? "dark" : "light") : mode;
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(resolved);
          if (mode === "auto") {
            document.documentElement.removeAttribute("data-theme");
          } else {
            document.documentElement.setAttribute("data-theme", mode);
          }
          document.documentElement.style.colorScheme = resolved;
        } catch (error) {
          console.error(error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
